<!doctype html>
<html lang="no">
    <head>
        <meta charset="UTF-8" />
        <title>Handlekurv - {{ title }}</title>
        <link
            rel="stylesheet"
            href="{{ url_for('static', filename='css/style.css') }}"
        />
    </head>
    <body>
        <a href="/" style="color: #00ff00; text-decoration: none"
            >[ < ] GÅ TILBAKE</a
        ><br>

        <h1>Din Handlekurv _</h1> 

        <div class="product-list">
            {% if cart_items %} {% for item in cart_items %}
            <div class="product-card">
                <span>> {{ item.name }}</span>
                <span>{{ item.price }} KR</span>
            </div>
            {% endfor %}

            <div class="total-section">TOTAL: {{ total }} KR</div>

            <div class="checkout-container">
                <form action="{{ url_for('pay_order') }}" method="POST">
                    <label for="email"
                        >SKRIV INN DIN E-POST FOR BEKREFTELSE:</label
                    >
                    <input
                        type="email"
                        id="email"
                        name="user_email"
                        required
                        placeholder="USER@TERMINAL.COM"
                    />

                    <button type="submit" class="btn-primary">
                        FULLFØR BESTILLING _
                    </button>
                </form>
                <div style="margin-top: 20px">
                    <a href="{{ url_for('clear_cart') }}" class="btn-danger"
                        >[ TØM KURV ]</a
                    >
                </div>
            </div>
            {% else %}
            <p style="color: #555">
                KURVEN DIN ER TOM. VENNLIGST VELG PRODUKTER.
            </p>
            {% endif %}
        </div>
    </body>
</html>
